name: build all

on:
  push:
    branches:
      - main
  pull_request:

env:
  FLUTTER_VERSION: "3.44.4"
  PYTHON_VERSION: "3.13"

jobs:
  test_backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Install dependencies
        run: uv sync --frozen
      - name: Import FastAPI app
        run: uv run python -c "from server import app; print(app.title)"

  test_flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test

  build_android:
    runs-on: ubuntu-latest
    needs:
      - test_flutter
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      # - name: Download Android keystore
      #   id: android_keystore
      #   uses: timheuer/base64-to-file@v1.0.3
      #   with:
      #     fileName: key.jks
      #     encodedString: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      # - name: Create key.properties
      #   run: |
      #     echo "storeFile=${{ steps.android_keystore.outputs.filePath }}" > android/key.properties
      #     echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
      #     echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
      #     echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
      - name: Install dependencies
        run: flutter pub get
      - name: Build Android App Bundle
        run: flutter build appbundle --release
      - name: Archive Android
        uses: actions/upload-artifact@v7.0.1
        with:
          name: android-build
          path: build/app/outputs/bundle/release/app-release.aab

  build_ios:
    runs-on: macos-latest
    needs:
      - test_flutter
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build iOS
        run: flutter build ios --release --no-codesign
      - name: Archive iOS
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
      # - name: Export IPA
      #   run: |
      #     cd ios
      #     xcodebuild -workspace Runner.xcworkspace -scheme Runner -sdk iphoneos -configuration Release archive -archivePath $PWD/build/Runner.xcarchive
      #     xcodebuild -exportArchive -archivePath $PWD/build/Runner.xcarchive -exportOptionsPlist ExportOptions.plist -exportPath $PWD/build/Runner.ipa
      # - name: Archive iOS IPA
      #   uses: actions/upload-artifact@v7.0.1
      #   with:
      #     name: ios-build
      #     path: build/ios/build/Runner.ipa/Runner.ipa

  build_macos:
    runs-on: macos-latest
    needs:
      - test_flutter
    env:
      MACOS_APP_RELEASE_PATH: build/macos/Build/Products/Release
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build macOS
        run: flutter build macos --release
      - name: Archive macOS
        uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-build
          path: ${{ env.MACOS_APP_RELEASE_PATH }}

  build_windows:
    runs-on: windows-latest
    needs:
      - test_flutter
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
      - name: Archive Windows
        uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-build
          path: build/windows/runner/Release

  build_web:
    runs-on: ubuntu-latest
    needs:
      - test_backend
      - test_flutter
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: |
          uv sync --frozen
          flutter pub get
      - name: Build Web
        run: |
          flutter build web --release
          mkdir ./web-release
          cp -r server build pyproject.toml uv.lock ./web-release
      - name: Archive Web
        uses: actions/upload-artifact@v7.0.1
        with:
          name: web-build
          path: ./web-release
